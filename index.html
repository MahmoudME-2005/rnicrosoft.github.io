<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Alert</title>
        <style>
            body {
                background-color: red;
                height: 100vh;
                margin: 0;
                display: flex;
                justify-content: center;
                align-items: center;
                overflow: hidden;
                font-family: 'Courier New', Courier, monospace;
            }

            h1 {
                color: white;
                font-size: 5rem;
                text-transform: uppercase;
                text-align: center;
                /* Added a slight shadow for that classic "alert" look */
                text-shadow: 5px 5px 10px rgba(0, 0, 0, 0.5);
                animation: blink 1s infinite;
            }

            @keyframes blink {
                0% { opacity: 1; }
                50% { opacity: 0.5; }
                100% { opacity: 1; }
            }
        </style>
    </head>
    <body>

        <h1>YOU'VE BEEN HACKED BY MAHMOUDME2005</h1>

    </body>
</html>
